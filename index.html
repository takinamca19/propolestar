<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROPOLESTAR — AI Performance Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0066FF;
    --blue-glow: rgba(0,102,255,0.3);
    --lime: #C6FF00;
    --midnight: #080C14;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--midnight);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
  }
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .bg-blob-1 { top: -10%; left: -10%; width: 45vw; height: 45vw; background: rgba(0,102,255,0.12); }
  .bg-blob-2 { bottom: -10%; right: -10%; width: 45vw; height: 45vw; background: rgba(198,255,0,0.05); }
  .wrapper { width: 100%; max-width: 680px; position: relative; z-index: 1; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; animation: fadeDown 0.5s ease forwards; }
  .logo-group { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 26px; box-shadow: 0 0 24px var(--blue-glow); }
  .logo-text h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 26px; letter-spacing: -0.5px; line-height: 1; text-transform: uppercase; }
  .logo-text h1 span { color: var(--blue); }
  .logo-text p { font-size: 9px; letter-spacing: 0.35em; font-weight: 700; opacity: 0.35; text-transform: uppercase; margin-top: 2px; }
  .lang-switcher { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; gap: 4px; }
  .lang-btn { padding: 6px 14px; border-radius: 7px; border: none; background: transparent; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; opacity: 0.35; transition: all 0.2s; }
  .lang-btn.active { background: var(--blue); opacity: 1; box-shadow: 0 2px 12px var(--blue-glow); }

  /* Tabs */
  .tabs { display: flex; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 5px; margin-bottom: 12px; }
  .tab-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 12px; border: none; background: transparent; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.05em; cursor: pointer; opacity: 0.35; transition: all 0.25s; }
  .tab-btn.active { background: rgba(255,255,255,0.08); color: var(--blue); opacity: 1; }
  .tab-btn svg { width: 16px; height: 16px; }

  /* Panel */
  .panel { height: 580px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(20px); }
  .panel-section { display: none; }
  .panel-section.active { display: flex; flex-direction: column; height: 100%; }

  /* Model bar */
  .model-bar { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; background: rgba(0,0,0,0.2); }
  .model-bar label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; opacity: 0.5; text-transform: uppercase; white-space: nowrap; }
  .model-select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 700; outline: none; cursor: pointer; }
  .model-select option { background: #111; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #00cc66; box-shadow: 0 0 8px #00cc66; margin-left: auto; flex-shrink: 0; }
  .status-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; opacity: 0.4; text-transform: uppercase; }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .msg { display: flex; gap: 10px; animation: msgIn 0.3s ease forwards; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0; font-family: 'Barlow Condensed', sans-serif; }
  .msg.ai .msg-avatar { background: var(--blue); box-shadow: 0 0 12px var(--blue-glow); }
  .msg.user .msg-avatar { background: rgba(255,255,255,0.1); }
  .msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
  .msg.ai .msg-bubble { background: rgba(0,102,255,0.1); border: 1px solid rgba(0,102,255,0.2); border-radius: 4px 16px 16px 16px; }
  .msg.user .msg-bubble { background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-radius: 16px 4px 16px 16px; text-align: right; }
  .typing-dots { display: flex; gap: 5px; padding: 4px 0; }
  .typing-dots span { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; animation: dot 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; opacity: 0.3; text-align: center; padding: 20px; }
  .empty-state svg { width: 40px; height: 40px; }
  .empty-state p { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }

  /* Input */
  .chat-input-bar { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; background: rgba(0,0,0,0.15); }
  .chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; resize: none; outline: none; transition: border-color 0.2s; min-height: 46px; max-height: 120px; line-height: 1.4; }
  .chat-input:focus { border-color: var(--blue); }
  .chat-input::placeholder { opacity: 0.3; }
  .send-btn { width: 46px; height: 46px; border-radius: 12px; background: var(--blue); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 0 16px var(--blue-glow); flex-shrink: 0; }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; }

  /* Voice */
  .voice-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; padding: 30px; }
  .orb-container { position: relative; display: flex; align-items: center; justify-content: center; }
  .orb-ring { position: absolute; border-radius: 50%; border: 1px solid var(--blue); opacity: 0; }
  .orb-container.listening .orb-ring-1 { width: 160px; height: 160px; animation: orbPulse 1.5s ease-out infinite; }
  .orb-container.listening .orb-ring-2 { width: 200px; height: 200px; animation: orbPulse 1.5s ease-out 0.4s infinite; }
  .orb-container.listening .orb-ring-3 { width: 240px; height: 240px; animation: orbPulse 1.5s ease-out 0.8s infinite; }
  .orb-container.speaking .orb-ring-1 { width: 160px; height: 160px; animation: orbPulse 0.8s ease-out infinite; border-color: var(--lime); }
  .orb-container.speaking .orb-ring-2 { width: 200px; height: 200px; animation: orbPulse 0.8s ease-out 0.2s infinite; border-color: var(--lime); }
  .orb-container.speaking .orb-ring-3 { width: 240px; height: 240px; animation: orbPulse 0.8s ease-out 0.4s infinite; border-color: var(--lime); }
  .orb { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(0,102,255,0.8), rgba(0,40,120,0.9)); border: 2px solid rgba(0,102,255,0.5); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 40px var(--blue-glow); position: relative; z-index: 2; }
  .orb:hover { transform: scale(1.05); }
  .orb.listening { background: radial-gradient(circle at 35% 35%, rgba(0,102,255,1), rgba(0,60,180,0.9)); }
  .orb.speaking { background: radial-gradient(circle at 35% 35%, rgba(150,200,0,0.8), rgba(80,120,0,0.9)); border-color: rgba(198,255,0,0.5); box-shadow: 0 0 60px rgba(198,255,0,0.2); }
  .orb svg { width: 40px; height: 40px; }
  .voice-status { text-align: center; }
  .voice-status h3 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .voice-status p { font-size: 13px; opacity: 0.45; font-weight: 600; }
  .voice-transcript { width: 100%; max-width: 480px; background: rgba(0,102,255,0.06); border: 1px solid rgba(0,102,255,0.15); border-radius: 14px; padding: 14px 18px; font-size: 13px; line-height: 1.6; min-height: 60px; text-align: center; opacity: 0.5; }
  .voice-transcript.has-text { opacity: 1; }
  .voice-controls { display: flex; gap: 10px; }
  .voice-ctrl-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .voice-ctrl-btn:hover { border-color: var(--blue); color: var(--blue); }
  .voice-ctrl-btn.danger:hover { border-color: #ff4444; color: #ff4444; }

  /* Footer */
  .footer { margin-top: 18px; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; opacity: 0.25; }
  .footer-links { display: flex; gap: 18px; }
  .footer-links span { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
  .footer-powered { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
  .footer-powered b { color: var(--blue); font-weight: 900; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a0a0a; border: 1px solid rgba(255,60,60,0.4); color: #ff6060; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: all 0.3s; white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: #0a1a0a; border-color: rgba(0,200,80,0.4); color: #00cc66; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes dot { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  @keyframes orbPulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.05); opacity: 0; } }
  @media (max-width: 480px) { .panel { height: 520px; } .msg-bubble { max-width: 88%; } }
</style>
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>

<div class="wrapper">
  <div class="header">
    <div class="logo-group">
      <div class="logo-icon">P</div>
      <div class="logo-text">
        <h1><span>PRO</span>POLESTAR</h1>
        <p>AI Performance Agent</p>
      </div>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('tr')">TR</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-chat" onclick="switchTab('chat')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span data-tr="SOHBET" data-en="CHAT">SOHBET</span>
    </button>
    <button class="tab-btn" id="tab-voice" onclick="switchTab('voice')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <span data-tr="SESLİ" data-en="VOICE">SESLİ</span>
    </button>
  </div>

  <div class="panel">
    <!-- CHAT -->
    <div class="panel-section active" id="section-chat">
      <div class="model-bar">
        <label>MODEL</label>
        <select class="model-select" id="model-select">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
          <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
          <option value="gemma2-9b-it">Gemma 2 9B</option>
          <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
        </select>
        <div class="status-dot" id="status-dot"></div>
        <span class="status-label" id="status-label">READY</span>
      </div>
      <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          <p data-tr="Konuşmaya başlamak için bir şeyler yaz" data-en="Type something to start chatting">Konuşmaya başlamak için bir şeyler yaz</p>
        </div>
      </div>
      <div class="chat-input-bar">
        <textarea class="chat-input" id="chat-input" rows="1"
          placeholder="Bir şey sor..."
          data-tr-placeholder="Bir şey sor..."
          data-en-placeholder="Ask something..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

    <!-- VOICE -->
    <div class="panel-section" id="section-voice">
      <div class="model-bar">
        <label>MODEL</label>
        <select class="model-select" id="model-select-voice">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
          <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
          <option value="gemma2-9b-it">Gemma 2 9B</option>
          <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
        </select>
      </div>
      <div class="voice-panel">
        <div class="orb-container" id="orb-container">
          <div class="orb-ring orb-ring-1"></div>
          <div class="orb-ring orb-ring-2"></div>
          <div class="orb-ring orb-ring-3"></div>
          <div class="orb" id="voice-orb" onclick="toggleVoice()">
            <svg id="orb-icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
            <svg id="orb-icon-stop" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </div>
        </div>
        <div class="voice-status">
          <h3 id="voice-status-title">Konuşmak için bas</h3>
          <p id="voice-status-sub">Mikrofon izni gerekli</p>
        </div>
        <div class="voice-transcript" id="voice-transcript">
          <span id="voice-transcript-text">Sesli yanıt için üstteki orbe bas...</span>
        </div>
        <div class="voice-controls">
          <button class="voice-ctrl-btn" onclick="clearVoiceHistory()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
            <span data-tr="TEMİZLE" data-en="CLEAR">TEMİZLE</span>
          </button>
          <button class="voice-ctrl-btn danger" onclick="stopSpeaking()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
            <span data-tr="DURDUR" data-en="STOP">DURDUR</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-links">
      <span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg><span data-tr="AYARLAR" data-en="SETTINGS">AYARLAR</span></span>
      <span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/></svg><span data-tr="YARDIM" data-en="HELP">YARDIM</span></span>
    </div>
    <div class="footer-powered">POWERED BY <b>GROQ + LLAMA</b></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────
let currentLang = 'tr';
let chatHistory = [];
let isLoading = false;
let recognition = null;
let isListening = false;
let isSpeaking = false;
let voiceHistory = [];

// ── Language ─────────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.querySelectorAll('[data-tr]').forEach(el => {
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      el.placeholder = el.getAttribute(`data-${lang}-placeholder`) || el.placeholder;
    } else {
      el.textContent = el.getAttribute(`data-${lang}`) || el.textContent;
    }
  });
}

// ── Tabs ─────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
  document.getElementById(`section-${tab}`).classList.add('active');
}

// ── Utils ────────────────────────────────────────────────────────
function showToast(msg, type = 'error') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 4000);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function setStatus(text, color) {
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  if (label) label.textContent = text;
  if (dot) dot.style.background = color || '#00cc66';
  if (dot) dot.style.boxShadow = `0 0 8px ${color || '#00cc66'}`;
}

// ── Chat ─────────────────────────────────────────────────────────
function addMessage(role, text) {
  const container = document.getElementById('messages');
  document.getElementById('empty-state')?.remove();
  const msgDiv = document.createElement('div');
  msgDiv.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? 'AI' : 'U';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  msgDiv.appendChild(avatar);
  msgDiv.appendChild(bubble);
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
}

function addTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = 'AI';
  const b = document.createElement('div'); b.className = 'msg-bubble';
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(av); div.appendChild(b);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isLoading = true;
  setStatus('THINKING...', '#0066FF');

  chatHistory.push({ role: 'user', content: text });
  addMessage('user', text);
  addTyping();

  const systemPrompt = currentLang === 'tr'
    ? 'Sen PROPOLESTAR AI adında, performans ve spor odaklı çalışan bir yapay zeka asistansın. Kısa, net ve enerjik cevaplar ver. Türkçe konuş.'
    : 'You are PROPOLESTAR AI, a performance and sports-focused AI assistant. Give short, sharp, energetic answers.';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: document.getElementById('model-select').value,
        messages: [{ role: 'system', content: systemPrompt }, ...chatHistory],
        max_tokens: 1024
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '...';
    chatHistory.push({ role: 'assistant', content: reply });
    document.getElementById('typing')?.remove();
    addMessage('ai', reply);
    setStatus('READY', '#00cc66');

  } catch (e) {
    document.getElementById('typing')?.remove();
    addMessage('ai', `⚠️ ${e.message}`);
    showToast(e.message);
    chatHistory.pop();
    setStatus('ERROR', '#ff4444');
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }
}

// ── Voice ────────────────────────────────────────────────────────
function setOrbState(state) {
  document.getElementById('voice-orb').className = `orb ${state !== 'idle' ? state : ''}`;
  document.getElementById('orb-container').className = `orb-container ${state !== 'idle' ? state : ''}`;
  document.getElementById('orb-icon-mic').style.display = state === 'idle' ? 'block' : 'none';
  document.getElementById('orb-icon-stop').style.display = state !== 'idle' ? 'block' : 'none';
}

function setVoiceStatus(title, sub) {
  document.getElementById('voice-status-title').textContent = title;
  document.getElementById('voice-status-sub').textContent = sub;
}

function setTranscript(text) {
  document.getElementById('voice-transcript-text').textContent = text;
  document.getElementById('voice-transcript').classList.toggle('has-text', !!text);
}

function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Speech recognition not supported. Use Chrome.'); return null; }
  const rec = new SR();
  rec.continuous = false;
  rec.interimResults = true;
  rec.lang = currentLang === 'tr' ? 'tr-TR' : 'en-US';

  rec.onstart = () => {
    isListening = true;
    setOrbState('listening');
    setVoiceStatus(currentLang === 'tr' ? 'Dinliyorum...' : 'Listening...', currentLang === 'tr' ? 'Konuşun' : 'Speak now');
  };

  rec.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    setTranscript(final || interim);
    if (final) handleVoiceInput(final.trim());
  };

  rec.onerror = (e) => {
    isListening = false; setOrbState('idle');
    if (e.error === 'not-allowed') showToast('⚠️ Microphone permission denied');
    else if (e.error !== 'no-speech') showToast(`Mic error: ${e.error}`);
    setVoiceStatus(currentLang === 'tr' ? 'Konuşmak için bas' : 'Tap to speak', '');
  };

  rec.onend = () => { isListening = false; if (!isSpeaking) setOrbState('idle'); };
  return rec;
}

async function handleVoiceInput(text) {
  if (!text) return;
  setOrbState('idle');
  setVoiceStatus(currentLang === 'tr' ? 'Düşünüyorum...' : 'Thinking...', currentLang === 'tr' ? 'Yanıt hazırlanıyor' : 'Generating response');

  voiceHistory.push({ role: 'user', content: text });

  const systemPrompt = currentLang === 'tr'
    ? 'Sen PROPOLESTAR AI. Sesli konuşma için KISA yanıtlar ver. Maksimum 2-3 cümle. Türkçe konuş.'
    : 'You are PROPOLESTAR AI. Give SHORT answers for voice. Max 2-3 sentences.';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: document.getElementById('model-select-voice').value,
        messages: [{ role: 'system', content: systemPrompt }, ...voiceHistory],
        max_tokens: 300
      })
    });

    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '...';
    voiceHistory.push({ role: 'assistant', content: reply });
    setTranscript(reply);
    speak(reply);

  } catch (e) {
    setOrbState('idle');
    setVoiceStatus(currentLang === 'tr' ? 'Hata oluştu' : 'Error occurred', e.message);
    showToast(e.message);
    voiceHistory.pop();
  }
}

function speak(text) {
  if (!window.speechSynthesis) { showToast('TTS not supported'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = currentLang === 'tr' ? 'tr-TR' : 'en-US';
  u.rate = 0.95; u.pitch = 1; u.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith(currentLang === 'tr' ? 'tr' : 'en') && v.localService);
  if (preferred) u.voice = preferred;
  u.onstart = () => { isSpeaking = true; setOrbState('speaking'); setVoiceStatus(currentLang === 'tr' ? 'Konuşuyorum...' : 'Speaking...', ''); };
  u.onend = () => { isSpeaking = false; setOrbState('idle'); setVoiceStatus(currentLang === 'tr' ? 'Konuşmak için bas' : 'Tap to speak', currentLang === 'tr' ? 'Hazır' : 'Ready'); };
  u.onerror = () => { isSpeaking = false; setOrbState('idle'); };
  window.speechSynthesis.speak(u);
}

function toggleVoice() {
  if (isSpeaking) { stopSpeaking(); return; }
  if (isListening) { recognition?.stop(); return; }
  recognition = setupRecognition();
  if (recognition) recognition.start();
}

function stopSpeaking() {
  window.speechSynthesis?.cancel();
  recognition?.abort();
  isSpeaking = false; isListening = false;
  setOrbState('idle');
  setVoiceStatus(currentLang === 'tr' ? 'Konuşmak için bas' : 'Tap to speak', currentLang === 'tr' ? 'Durduruldu' : 'Stopped');
}

function clearVoiceHistory() {
  voiceHistory = [];
  setTranscript(currentLang === 'tr' ? 'Sesli yanıt için üstteki orbe bas...' : 'Tap the orb to start speaking...');
  document.getElementById('voice-transcript').classList.remove('has-text');
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
</script>
